<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Prediction API</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { margin: 10px; padding: 10px; width: 80%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Machine Learning Prediction</h2>
        <p>Masukkan nilai fitur untuk prediksi:</p>
        
        <form action="/predict" method="post">
            <input type="text" name="feature1" placeholder="Fitur 1" required>
            <input type="text" name="feature2" placeholder="Fitur 2" required>
            <input type="text" name="feature3" placeholder="Fitur 3" required>
            <br>
            <button type="submit">Prediksi</button>
        </form>

        <br>
        <h3>{{ prediction_text }}</h3>
    </div>
</body>
</html>
