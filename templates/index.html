<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Prediction - 17 Features</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        input { padding: 10px; border: 1px solid #dadce0; border-radius: 6px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #1a73e8; }
        .full-width { grid-column: span 2; margin-top: 20px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        .result { margin-top: 25px; padding: 15px; background-color: #e8f0fe; border-radius: 8px; color: #1967d2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Prediksi Linear Regression</h2>
        <p>Masukkan 17 nilai fitur untuk mendapatkan hasil prediksi</p>
        
        <form action="/predict" method="post">
            <div class="form-grid">
                <input type="number" step="any" name="f1" placeholder="Fitur 1" required>
                <input type="number" step="any" name="f2" placeholder="Fitur 2" required>
                <input type="number" step="any" name="f3" placeholder="Fitur 3" required>
                <input type="number" step="any" name="f4" placeholder="Fitur 4" required>
                <input type="number" step="any" name="f5" placeholder="Fitur 5" required>
                <input type="number" step="any" name="f6" placeholder="Fitur 6" required>
                <input type="number" step="any" name="f7" placeholder="Fitur 7" required>
                <input type="number" step="any" name="f8" placeholder="Fitur 8" required>
                <input type="number" step="any" name="f9" placeholder="Fitur 9" required>
                <input type="number" step="any" name="f10" placeholder="Fitur 10" required>
                <input type="number" step="any" name="f11" placeholder="Fitur 11" required>
                <input type="number" step="any" name="f12" placeholder="Fitur 12" required>
                <input type="number" step="any" name="f13" placeholder="Fitur 13" required>
                <input type="number" step="any" name="f14" placeholder="Fitur 14" required>
                <input type="number" step="any" name="f15" placeholder="Fitur 15" required>
                <input type="number" step="any" name="f16" placeholder="Fitur 16" required>
                <input type="number" step="any" name="f17" placeholder="Fitur 17" required>
                
                <div class="full-width">
                    <button type="submit">Proses Prediksi</button>
                </div>
            </div>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
